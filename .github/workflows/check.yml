name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Debug oxfmt expected format
        if: always()
        run: |
          cp package.json /tmp/before.json
          pnpm exec oxfmt --write package.json || true
          echo "=== DIFF ==="
          diff -u /tmp/before.json package.json || true
          echo "=== END DIFF ==="
          # restore so the rest of the run uses the original
          cp /tmp/before.json package.json
      - run: pnpm run check
